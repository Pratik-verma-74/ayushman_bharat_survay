<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1c1c25; /* Modern dark background */
            overflow: hidden;
            perspective: 1000px;
        }

        /* Animated Background Elements */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            filter: blur(80px);
            z-index: 1;
            animation: animateCircle 10s ease-in-out infinite alternate;
        }

        .circle:nth-child(1) {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }

        .circle:nth-child(2) {
            width: 350px;
            height: 350px;
            bottom: -50px;
            right: -50px;
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            animation-delay: -5s;
        }

        @keyframes animateCircle {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-50px) scale(1.1); }
        }

        /* 3D Glassmorphism Login Card */
        .login-box {
            position: relative;
            width: 400px;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            z-index: 2;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                20px 20px 50px rgba(0, 0, 0, 0.5),
                inset 5px 5px 15px rgba(255, 255, 255, 0.05),
                inset -5px -5px 15px rgba(0, 0, 0, 0.3);
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        /* 3D Hover effect on the whole card */
        .login-box:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(-5deg);
            box-shadow: 
                30px 30px 60px rgba(0, 0, 0, 0.6),
                inset 5px 5px 15px rgba(255, 255, 255, 0.1),
                inset -5px -5px 15px rgba(0, 0, 0, 0.4);
        }

        .login-box h2 {
            color: #fff;
            text-align: center;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 35px;
            letter-spacing: 1px;
            transform: translateZ(40px); /* 3D pop out effect */
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .input-box {
            position: relative;
            width: 100%;
            margin-bottom: 30px;
            transform: translateZ(30px); /* 3D pop out */
        }

        .input-box input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            outline: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            letter-spacing: 1px;
            box-shadow: 
                inset 3px 3px 8px rgba(0, 0, 0, 0.5),
                inset -3px -3px 8px rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .input-box input:focus {
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 
                inset 3px 3px 8px rgba(0, 0, 0, 0.7),
                inset -3px -3px 8px rgba(255, 255, 255, 0.1),
                0 0 15px rgba(0, 210, 255, 0.4);
        }

        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            outline: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 
                0 8px 15px rgba(0, 0, 0, 0.3),
                inset 2px 2px 5px rgba(255, 255, 255, 0.3);
            transform: translateZ(40px); /* 3D pop out */
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .btn:hover {
            transform: translateZ(50px) scale(1.05);
            box-shadow: 
                0 15px 25px rgba(0, 0, 0, 0.4),
                inset 2px 2px 5px rgba(255, 255, 255, 0.4),
                0 0 20px rgba(0, 210, 255, 0.5);
        }

        .btn:active {
            transform: translateZ(20px) scale(0.95);
        }

        .links {
            display: flex;
            justify-content: space-between;
            transform: translateZ(30px);
        }

        .links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .links a:hover {
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }
        
        /* Floating decorative elements to enhance 3D feel */
        .login-box::before {
            content: '';
            position: absolute;
            top: -30px;
            left: -30px;
            width: 80px;
            height: 80px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: translateZ(60px);
            animation: floatElement1 6s ease-in-out infinite;
        }
        
        .login-box::after {
            content: '';
            position: absolute;
            bottom: -30px;
            right: -30px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: translateZ(80px);
            animation: floatElement2 8s ease-in-out infinite reverse;
        }

        @keyframes floatElement1 {
            0%, 100% { transform: translateY(0) translateZ(60px); }
            50% { transform: translateY(-20px) translateZ(60px); }
        }

        @keyframes floatElement2 {
            0%, 100% { transform: translateY(0) translateZ(80px); }
            50% { transform: translateY(-25px) translateZ(80px); }
        }

        /* Mobile responsiveness */
        @media (max-width: 480px) {
            .login-box {
                width: 90%;
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animated Shapes -->
    <div class="circle"></div>
    <div class="circle"></div>

    <!-- 3D Login Panel -->
    <div class="login-box">
        <h2>Welcome Back</h2>
        <form action="#" method="POST" id="loginForm">
            <div class="input-box">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn">Login</button>
            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Sign Up</a>
            </div>
        </form>
    </div>
</body>
</html>
