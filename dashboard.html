<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Audit Dashboard</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-main: #0f172a;
      --text-muted: #64748b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --border: rgba(226, 232, 240, 0.8);
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* Navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border-bottom: 1px solid var(--border);
    }
    .brand {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-main);
    }
    .back-btn {
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .back-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }

    /* Layout */
    .container {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 20px;
    }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .kpi-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid var(--border);
      transition: transform 0.2s;
    }
    .kpi-card:hover { transform: translateY(-3px); }
    .kpi-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .icon-blue { background: #eff6ff; color: #3b82f6; }
    .icon-green { background: #ecfdf5; color: #10b981; }
    .icon-purple { background: #faf5ff; color: #a855f7; }
    
    .kpi-details h4 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .kpi-details p {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-main);
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
      gap: 12px;
    }
    .filter-btn {
      background: #fff;
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: var(--text-main);
      color: #fff;
      border-color: var(--text-main);
    }

    /* Charts Grid */
    .chart-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    @media (max-width: 900px) {
      .chart-grid { grid-template-columns: 1fr; }
    }
    .chart-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .chart-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chart-wrapper {
      position: relative;
      height: 300px;
      width: 100%;
    }

    /* Table */
    .table-container {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-header h3 {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 16px 24px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      background: #f8fafc;
    }
    td {
      font-size: 14px;
      color: var(--text-main);
      font-weight: 500;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    
    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: #e2e8f0;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
    }
    .rank-1 { background: #fef08a; color: #854d0e; }
    .rank-2 { background: #e2e8f0; color: #475569; }
    .rank-3 { background: #fed7aa; color: #9a3412; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state i {
      font-size: 48px;
      color: #cbd5e1;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="brand">
      <i class="ph-fill ph-chart-pie-slice" style="color:#3b82f6;"></i>
      Analytics Dashboard
    </div>
    <a href="index.html" class="back-btn"><i class="ph-bold ph-arrow-left"></i> Back to App</a>
  </nav>

  <div class="container" id="main-content">
    
    <!-- KPI Grid -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-icon icon-blue"><i class="ph-fill ph-users"></i></div>
        <div class="kpi-details">
          <h4>Total Patients</h4>
          <p id="kpi-patients">0</p>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon icon-purple"><i class="ph-fill ph-buildings"></i></div>
        <div class="kpi-details">
          <h4>Total Hospitals</h4>
          <p id="kpi-hospitals">0</p>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon icon-green"><i class="ph-fill ph-calendar-check"></i></div>
        <div class="kpi-details">
          <h4>Audits Today</h4>
          <p id="kpi-today">0</p>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="filter-btn active" onclick="updateView('daily')" id="btn-daily">Daily</button>
      <button class="filter-btn" onclick="updateView('weekly')" id="btn-weekly">Weekly</button>
      <button class="filter-btn" onclick="updateView('monthly')" id="btn-monthly">Monthly</button>
    </div>

    <!-- Charts -->
    <div class="chart-grid">
      <div class="chart-card">
        <h3><i class="ph-fill ph-trend-up"></i> Patient Trend</h3>
        <div class="chart-wrapper">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h3><i class="ph-fill ph-chart-bar"></i> Top Hospitals</h3>
        <div class="chart-wrapper">
          <canvas id="hospitalChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Data Table -->
    <div class="table-container">
      <div class="table-header">
        <h3><i class="ph-fill ph-list-numbers"></i> Hospital Performance Ranking</h3>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width: 80px;">Rank</th>
            <th>Hospital Name</th>
            <th style="text-align: right;">Total Patients</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- Rows will be injected here -->
        </tbody>
      </table>
    </div>

  </div>

  <script>
    // 1. Load Data
    let rawData = [];
    try {
      rawData = JSON.parse(localStorage.getItem('audit_history')) || [];
    } catch(e) {
      console.error("Could not load data", e);
    }

    // Default empty state
    if (rawData.length === 0) {
      document.getElementById('main-content').innerHTML = `
        <div class="empty-state">
          <i class="ph-fill ph-empty"></i>
          <h2>No Data Available</h2>
          <p>Please complete some audits in the main app to see analytics.</p>
        </div>
      `;
    }

    // 2. Global Variables
    let trendChartInstance = null;
    let hospitalChartInstance = null;
    let currentView = 'daily'; // daily | weekly | monthly

    // 3. Data Processing Helpers
    const getWeekNumber = (d) => {
      d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
      var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
      var weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
      return d.getUTCFullYear() + "-W" + weekNo;
    }

    const getMonthString = (d) => {
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      return months[d.getMonth()] + " " + d.getFullYear();
    }

    // 4. Calculate KPIs
    function updateKPIs() {
      document.getElementById('kpi-patients').innerText = rawData.length;
      
      const hospitals = new Set(rawData.map(d => (d.hospName || 'Unknown').trim().toLowerCase()));
      document.getElementById('kpi-hospitals').innerText = hospitals.size;

      const todayStr = new Date().toISOString().split('T')[0];
      const todayCount = rawData.filter(d => (d.dateAudit || '') === todayStr).length;
      document.getElementById('kpi-today').innerText = todayCount;
    }

    // 5. Render Views
    function updateView(viewMode) {
      currentView = viewMode;
      
      // Update active button
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('btn-' + viewMode).classList.add('active');

      // Process Data for Trend Chart
      const trendData = {};
      rawData.forEach(item => {
        let key = 'Unknown';
        if(item.dateAudit) {
          const d = new Date(item.dateAudit);
          if (viewMode === 'daily') {
            key = item.dateAudit; // YYYY-MM-DD
          } else if (viewMode === 'weekly') {
            key = getWeekNumber(d);
          } else if (viewMode === 'monthly') {
            key = getMonthString(d);
          }
        }
        trendData[key] = (trendData[key] || 0) + 1;
      });

      // Sort dates
      const sortedKeys = Object.keys(trendData).sort();
      const trendLabels = sortedKeys;
      const trendValues = sortedKeys.map(k => trendData[k]);

      // Process Data for Hospital Chart & Table
      const hospData = {};
      rawData.forEach(item => {
        const hName = (item.hospName || 'Unknown Hospital').trim();
        hospData[hName] = (hospData[hName] || 0) + 1;
      });

      const sortedHospitals = Object.keys(hospData)
        .map(h => ({ name: h, count: hospData[h] }))
        .sort((a, b) => b.count - a.count);

      const top5 = sortedHospitals.slice(0, 5);
      
      renderTrendChart(trendLabels, trendValues);
      renderHospitalChart(top5.map(h => h.name), top5.map(h => h.count));
      renderTable(sortedHospitals);
    }

    // 6. Chart Rendering
    function renderTrendChart(labels, data) {
      const ctx = document.getElementById('trendChart').getContext('2d');
      if (trendChartInstance) trendChartInstance.destroy();

      // Create gradient
      const gradient = ctx.createLinearGradient(0, 0, 0, 400);
      gradient.addColorStop(0, 'rgba(59, 130, 246, 0.5)');
      gradient.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

      trendChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Patients Audited',
            data: data,
            borderColor: '#3b82f6',
            backgroundColor: gradient,
            borderWidth: 3,
            tension: 0.4,
            fill: true,
            pointBackgroundColor: '#ffffff',
            pointBorderColor: '#3b82f6',
            pointBorderWidth: 2,
            pointRadius: 4,
            pointHoverRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1e293b',
              padding: 12,
              titleFont: { family: 'Inter', size: 14 },
              bodyFont: { family: 'Inter', size: 14 },
              displayColors: false
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { family: 'Inter' } } },
            y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { family: 'Inter' }, precision: 0 } }
          }
        }
      });
    }

    function renderHospitalChart(labels, data) {
      const ctx = document.getElementById('hospitalChart').getContext('2d');
      if (hospitalChartInstance) hospitalChartInstance.destroy();

      hospitalChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{
            data: data,
            backgroundColor: [
              '#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ec4899'
            ],
            borderWidth: 0,
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '70%',
          plugins: {
            legend: { 
              position: 'bottom',
              labels: {
                usePointStyle: true,
                padding: 20,
                font: { family: 'Inter', size: 12 }
              }
            },
            tooltip: {
              backgroundColor: '#1e293b',
              padding: 12,
              bodyFont: { family: 'Inter', size: 14 },
              callbacks: {
                label: function(context) {
                  return ' ' + context.label + ': ' + context.raw + ' patients';
                }
              }
            }
          }
        }
      });
    }

    // 7. Table Rendering
    function renderTable(hospitals) {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';

      if(hospitals.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#64748b;">No data to display</td></tr>';
        return;
      }

      hospitals.forEach((h, index) => {
        const rank = index + 1;
        let rankClass = '';
        if(rank === 1) rankClass = 'rank-1';
        else if(rank === 2) rankClass = 'rank-2';
        else if(rank === 3) rankClass = 'rank-3';

        const row = document.createElement('tr');
        row.innerHTML = `
          <td>
            <span class="rank-badge ${rankClass}">${rank}</span>
          </td>
          <td style="font-weight:600;">${h.name}</td>
          <td style="text-align: right; font-weight:700; color:#3b82f6;">${h.count}</td>
        `;
        tbody.appendChild(row);
      });
    }

    // Initialize
    if (rawData.length > 0) {
      updateKPIs();
      updateView('daily');
    }

  </script>
</body>
</html>
